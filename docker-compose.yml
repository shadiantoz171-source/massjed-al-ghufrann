version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: massjed_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend/laravel
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: massjed_db
      DB_USERNAME: postgres
      DB_PASSWORD: password
    volumes:
      - ./backend/laravel:/var/www/html
      - ./backend/laravel/vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
